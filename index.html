<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nossos Produtos</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700&family=Roboto:wght@400;500&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Roboto', sans-serif;
            background: #f8f8f8;
            color: #222;
            line-height: 1.5;
        }
        header {
            background: #0A1F3A;
            padding: 10px 15px 25px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
            position: relative;
            text-align: center;
        }
        .logo {
            display: block;
            margin: 5px auto 0;
            width: 160px;
            height: auto;
        }
        .lojas-title {
            font-family: 'Montserrat', sans-serif;
            font-size: 1.5rem;
            font-weight: 700;
            color: #fff;
            margin: 10px 0 15px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        @media (min-width: 601px) {
            header {
                padding: 15px 30px 40px;
            }
            .logo {
                position: absolute;
                top: -28px;
                left: 30px;
                margin: 0;
                width: 220px;
            }
            .lojas-title {
                font-size: 1.9rem;
                margin: 15px 0 20px;
            }
        }

        .grid-produtos {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            padding: 20px 15px;
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Desktop: 4 produtos por linha */
        @media (min-width: 768px) {
            .grid-produtos {
                grid-template-columns: repeat(4, 1fr);
                gap: 30px;
                padding: 40px 30px;
            }
        }

        .produto {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            transition: all 0.3s ease;
            text-align: center;
            position: relative;
            cursor: pointer;
        }
        .produto:hover {
            transform: translateY(-8px);
            box-shadow: 0 12px 30px rgba(0,0,0,0.15);
        }

        .produto img {
            width: 100%;
            height: 220px;
            object-fit: contain;
            background: #f9f9f9;
            padding: 15px;
            transition: transform 0.3s;
        }
        .produto:hover img {
            transform: scale(1.05);
        }
        .info {
            padding: 15px;
        }
        .titulo {
            font-size: 1rem;
            font-weight: 500;
            margin: 8px 0;
            min-height: 48px;
        }
        .preco {
            font-size: 1.3rem;
            font-weight: bold;
            color: #000;
            margin: 6px 0;
        }
        .btn-adquirir {
            display: block;
            margin: 12px auto 8px;
            padding: 12px 20px;
            background: #E07A00;
            color: white;
            text-decoration: none;
            font-weight: bold;
            font-size: 0.95rem;
            border-radius: 50px;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .btn-adquirir:hover {
            background: #C96B00;
            transform: translateY(-2px);
        }

        /* Mobile: 1 produto por linha, imagem à esquerda + descrição ao lado */
        @media (max-width: 767px) {
            .grid-produtos {
                grid-template-columns: 1fr;
                gap: 20px;
                padding: 15px;
            }
            .produto {
                display: flex;
                flex-direction: row;
                align-items: flex-start;
                text-align: left;
                padding: 12px;
                gap: 12px;
                border-radius: 12px;
            }
            .produto img {
                width: 120px;
                height: 120px;
                object-fit: contain;
                padding: 8px;
                margin: 0;
                flex-shrink: 0;
            }
            .info {
                flex: 1;
                padding: 8px 0;
            }
            .titulo {
                font-size: 1rem;
                margin: 0 0 4px;
            }
            .preco {
                font-size: 1.2rem;
                margin: 4px 0 8px;
            }
            .btn-adquirir {
                padding: 8px 16px;
                font-size: 0.85rem;
                margin: 0;
                width: auto;
                max-width: none;
            }
        }

        /* Lightbox para maximizar imagem */
        #lightbox {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }
        #lightbox img {
            max-width: 90%;
            max-height: 90%;
            object-fit: contain;
            border-radius: 8px;
            box-shadow: 0 0 30px rgba(0,0,0,0.8);
        }
        footer {
            text-align: center;
            padding: 25px;
            background: #222;
            color: white;
            font-size: 0.85rem;
        }
    </style>
</head>
<body>

    <header>
        <img src="imagens/anuncios.png" alt="R7 Studio 3D Logo" class="logo">

        <h2 class="lojas-title">MELHORES PRODUTOS</h2>
    </header>

    <div class="grid-produtos">

        <!-- Produto 1 -->
        <div class="produto" onclick="openLightbox('imagens/produto1.jpeg')">
            <img src="imagens/produto1.jpeg" alt="Mickey Mago 20x25cm – Fantasia Clássica Disney">
            <div class="info">
                <div class="titulo">Mickey Mago 20x25cm – Fantasia Clássica Disney</div>
                <div class="preco">R$ 120,00</div>
                <a href="https://wa.me/5513974276219?text=Olá%2C%20gostaria%20de%20Mickey%20Mago%2020x25cm%20%E2%80%93%20Fantasia%20Cl%C3%A1ssica%20Disney" class="btn-adquirir" target="_blank">
                    ADQUIRIR PRODUTO
                </a>
            </div>
        </div>

        <!-- Produto 2 -->
        <div class="produto" onclick="openLightbox('imagens/produto2.jpeg')">
            <img src="imagens/produto2.jpeg" alt="Águia Decorativa 10x15 - Escultura 3D">
            <div class="info">
                <div class="titulo">Águia Decorativa 10x15 - Escultura 3D</div>
                <div class="preco">R$ 18,00</div>
                <a href="https://wa.me/5513974276219?text=Olá%2C%20gostaria%20de%20Águia%20Decorativa%2010x15%20-%20Escultura%203D" class="btn-adquirir" target="_blank">
                    ADQUIRIR PRODUTO
                </a>
            </div>
        </div>

        <!-- Produto 3 -->
        <div class="produto" onclick="openLightbox('imagens/produto3.jpeg')">
            <img src="imagens/produto3.jpeg" alt="Barril Donkey Kong Clássico 3D 20x20cm">
            <div class="info">
                <div class="titulo">Barril Donkey Kong Clássico 3D 20x20cm</div>
                <div class="preco">R$ 150,00</div>
                <a href="https://wa.me/5513974276219?text=Olá%2C%20gostaria%20de%20Barril%20Donkey%20Kong%20Cl%C3%A1ssico%203D%2020x20cm" class="btn-adquirir" target="_blank">
                    ADQUIRIR PRODUTO
                </a>
            </div>
        </div>

    </div>

    <!-- Lightbox para maximizar imagem -->
    <div id="lightbox" onclick="closeLightbox()">
        <img id="lightbox-img" src="" alt="Imagem ampliada">
    </div>

    <footer>
        © Todos os direitos reservados | Contato: (13) 97427-6219
    </footer>

    <script>
        function openLightbox(src) {
            const lightbox = document.getElementById('lightbox');
            const img = document.getElementById('lightbox-img');
            img.src = src;
            lightbox.style.display = 'flex';
        }

        function closeLightbox() {
            document.getElementById('lightbox').style.display = 'none';
        }
    </script>

</body>
</html>
